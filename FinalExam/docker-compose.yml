# BUILDING AND RUNNING: docker compose up -d --build
# LOGGING: docker logs person-registry-db -f
# CONNECTING TO CONTAINER: docker exec -it person-registry-db /bin/sh
# CONNECTING TO DATABASE: docker exec -it person-registry-db psql -U postgres -d person_registry
# STOPPING WEB: docker stop person-registry-db
# REMOVING: docker compose down --rmi local --volumes --remove-orphans

name: Advanced-Web-Development-Final-Exam
services:
  db:
    image: postgres:latest
    container_name: person-registry-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: person_registry
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
  web:
    build: .
    container_name: person-registry-web
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/person_registry
    ports:
      - "3000:3000"
    volumes:
      - ./public:/app/public
      - ./app.js:/app/app.js